name: Build

on:
  workflow_dispatch:
    inputs:
      source:
        required: false
        default: ""
      mode:
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Validate secrets
        if: github.repository == 'rjaakash/peachmeow'
        env:
          S1: ${{ secrets.SIGNING_KEYSTORE_B64 }}
          S2: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          S3: ${{ secrets.SIGNING_KEY_ALIAS }}
          S4: ${{ secrets.SIGNING_KEY_PASSWORD }}
          S5: ${{ secrets.PEACHMEOW_GITHUB_PAT }}
        run: |
          set -e
          if [ -z "$S1" ]; then exit 1; fi
          if [ -z "$S2" ]; then exit 1; fi
          if [ -z "$S3" ]; then exit 1; fi
          if [ -z "$S4" ]; then exit 1; fi
          if [ -z "$S5" ]; then exit 1; fi

      - name: Prepare keystore
        if: github.repository == 'rjaakash/peachmeow'
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_B64 }}" | base64 -d > peachmeow-official.bks

      - name: Authenticate
        run: |
          if [ "${{ github.repository }}" = "rjaakash/peachmeow" ]; then
            printf '%s' "${{ secrets.PEACHMEOW_GITHUB_PAT }}" | gh auth login --with-token
          else
            printf '%s' "${{ github.token }}" | gh auth login --with-token
          fi

      - name: Build (official)
        if: github.repository == 'rjaakash/peachmeow'
        env:
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          PEACHMEOW_GITHUB_PAT: ${{ secrets.PEACHMEOW_GITHUB_PAT }}
        run: |
          export SIGNING_KEYSTORE_FILE=peachmeow-official.bks

          if [ -z "${{ github.event.inputs.source }}" ]; then
            python3 main.py
          else
            if [ -z "${{ github.event.inputs.mode }}" ]; then
              python3 main.py --source "${{ github.event.inputs.source }}"
            else
              python3 main.py --source "${{ github.event.inputs.source }}" --mode "${{ github.event.inputs.mode }}"
            fi
          fi

      - name: Build (community)
        if: github.repository != 'rjaakash/peachmeow'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          export PEACHMEOW_GITHUB_PAT="$GH_TOKEN"

          if [ -z "${{ github.event.inputs.source }}" ]; then
            python3 main.py
          else
            if [ -z "${{ github.event.inputs.mode }}" ]; then
              python3 main.py --source "${{ github.event.inputs.source }}"
            else
              python3 main.py --source "${{ github.event.inputs.source }}" --mode "${{ github.event.inputs.mode }}"
            fi
          fi
